<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WyCode AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--green:#CCFF00;--black:#000}
  body{background:linear-gradient(-45deg,#000,#001100,#CCFF00,#000);background-size:400% 400%;animation:bgMove 20s ease infinite;font-family:Inter}
  @keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
 .codeblock{background:#1e1e1e;border:1px solid #333;border-radius:12px;margin:10px 0}
 .codeheader{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#2a2a2a;border-bottom:1px solid #333;border-radius:12px 12px 0 0}
  pre{padding:12px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:13px}
 .msg-btn{opacity:0;transition:0.2s}
 .msg:hover.msg-btn{opacity:1}
 .particle{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1}
</style>
</head>
<body class="text-white">

<!-- PARTICLES BG -->
<canvas id="particles" class="particle"></canvas>

<!-- WELCOME PAGE -->
<div id="welcome" class="flex flex-col items-center justify-center h-screen text-center p-5">
  <h1 class="text-5xl font-bold bg-gradient-to-r from-white to-[#CCFF00] bg-clip-text text-transparent">WyCode AI</h1>
  <p id="rotatingText" class="text-gray-400 mt-4 h-6">Your Coding Partner</p>
  <button onclick="showAuth()" class="mt-8 bg-[#CCFF00] text-black px-10 py-3 rounded-full font-bold">Start Coding</button>
  <p class="mt-4 text-sm">Already have an account? <span onclick="showLogin()" class="text-[#CCFF00] cursor-pointer">Login</span></p>
</div>

<!-- AUTH PAGE -->
<div id="auth" class="hidden p-6 max-w-md mx-auto mt-10 bg-[#111] rounded-2xl">
  <h2 id="authTitle" class="text-2xl font-bold mb-4">Create Account</h2>
  <input id="username" placeholder="Username" class="w-full p-3 mb-3 bg-[#222] rounded-lg">
  <input id="email" placeholder="Email" type="email" class="w-full p-3 mb-3 bg-[#222] rounded-lg">
  <div class="relative">
    <input id="password" placeholder="Password" type="password" class="w-full p-3 mb-3 bg-[#222] rounded-lg">
    <span onclick="togglePass('password')" class="absolute right-3 top-3 cursor-pointer">👁️</span>
  </div>
  <input id="confirm" placeholder="Confirm Password" type="password" class="w-full p-3 mb-3 bg-[#222] rounded-lg hidden">
  <button onclick="handleAuth()" class="w-full bg-[#CCFF00] text-black py-3 rounded-lg font-bold">Continue</button>
  <p onclick="forgot()" class="text-[#CCFF00] text-sm mt-3 cursor-pointer">Forgot password?</p>
  <button onclick="googleLogin()" class="w-full border border-[#CCFF00] py-3 rounded-lg mt-3">Continue with Google</button>
  <p onclick="toggleAuthMode()" class="text-center mt-4 text-sm cursor-pointer">Switch to Login</p>
</div>

<!-- CHAT PAGE -->
<div id="chat" class="hidden flex flex-col h-screen">
  <div class="flex justify-between items-center p-4 bg-[#111]">
    <button onclick="toggleSidebar()">☰</button>
    <p id="greet" class="text-sm">Welcome back</p>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="sidebar" class="hidden fixed left-0 top-0 h-full w-64 bg-[#0a0a0a] p-4 z-10">
    <button onclick="newChat()" class="w-full bg-[#CCFF00] text-black py-2 rounded-lg mb-4">+ New Chat</button>
    <input id="search" placeholder="Search chats..." class="w-full p-2 bg-[#222] rounded-lg mb-4">
    <div id="chatHistory"></div>
  </div>

  <div id="messages" class="flex-1 overflow-y-auto p-4 pb-24"></div>

  <div class="fixed bottom-0 w-full p-4 bg-[#111] flex gap-2">
    <textarea id="userInput" placeholder="Ask WyCode anything..." class="flex-1 p-3 bg-[#222] rounded-xl resize-none"></textarea>
    <button onclick="sendMsg()" class="bg-[#CCFF00] text-black px-5 rounded-xl font-bold">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTAqb0waoaoSDrwOa2UXRjwl8wmSyXUs0",
  authDomain: "my-wyticle-id.firebaseapp.com",
  projectId: "my-wyticle-id",
  storageBucket: "my-wyticle-id.firebasestorage.app",
  messagingSenderId: "634169882815",
  appId: "1:634169882815:web:486d39a13ce2f855c0ae0a"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let isLogin = false;
let currentUser = null;
let chats = JSON.parse(localStorage.getItem('chats') || '[]');

// ROTATING TEXT
const WELCOME = ["Your Coding Partner","Generate, Debug, Deploy","Powered by Gemini 2.5 Flash"];
const GREET = ["Welcome back","Where should we start today","Ready to build something great?"];
let i=0; setInterval(()=>document.getElementById('rotatingText').innerText=WELCOME[i++%3],3000);
setInterval(()=>{if(document.getElementById('greet'))document.getElementById('greet').innerText=GREET[i++%3]},5000);

// AUTH FUNCTIONS
window.showAuth=()=>{document.getElementById('welcome').classList.add('hidden');document.getElementById('auth').classList.remove('hidden')}
window.showLogin=()=>{isLogin=true;document.getElementById('authTitle').innerText='Login';document.getElementById('confirm').classList.add('hidden');showAuth()}
window.toggleAuthMode=()=>{isLogin=!isLogin;document.getElementById('authTitle').innerText=isLogin?'Login':'Create Account';document.getElementById('confirm').classList.toggle('hidden')}
window.togglePass=(id)=>{const el=document.getElementById(id);el.type=el.type==='password'?'text':'password'}

window.handleAuth=async()=>{
  const email=document.getElementById('email').value;
  const pass=document.getElementById('password').value;
  try{
    if(isLogin) await signInWithEmailAndPassword(auth,email,pass);
    else await createUserWithEmailAndPassword(auth,email,pass);
    startChat();
  }catch(e){alert(e.message)}
}
window.forgot=async()=>{const email=prompt("Enter your email");await sendPasswordResetEmail(auth,email);alert(`Reset link sent to ${email}`)}
window.googleLogin=async()=>{await signInWithPopup(auth,new GoogleAuthProvider());startChat()}
window.logout=async()=>{await signOut(auth);location.reload()}

onAuthStateChanged(auth,user=>{if(user){currentUser=user;loadChats()}})

function startChat(){document.getElementById('auth').classList.add('hidden');document.getElementById('chat').classList.remove('hidden')}

// CHAT FUNCTIONS
window.toggleSidebar=()=>document.getElementById('sidebar').classList.toggle('hidden')
window.newChat=()=>{document.getElementById('messages').innerHTML='';toggleSidebar()}

function createCodeBlock(code,lang){
  const div=document.createElement('div');div.className='codeblock';
  div.innerHTML=`<div class="codeheader"><span class="text-xs text-[#CCFF00]">${lang||'text'}</span><div class="flex gap-2"><button onclick="copyCode(this)">Copy</button><button onclick="downloadCode(this,'${lang}')">Download</button></div></div><pre><code>${code}</code></pre>`;
  return div;
}
window.copyCode=(btn)=>{navigator.clipboard.writeText(btn.closest('.codeblock').querySelector('code').innerText);btn.innerText='Copied!';setTimeout(()=>btn.innerText='Copy',1500)}
window.downloadCode=(btn,lang)=>{const code=btn.closest('.codeblock').querySelector('code').innerText;const blob=new Blob([code],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`wycode-${Date.now()}.${lang||'txt'}`;a.click()}

function addMsg(text,type){
  const div=document.createElement('div');div.className=`msg p-3 rounded-xl mb-3 max-w-[80%] ${type==='user'?'bg-[#CCFF00] text-black ml-auto':'bg-[#1a1a1a]'}`;
  div.innerHTML=`<div>${text}</div><div class="msg-btn flex gap-2 mt-2 text-xs"><span onclick="editMsg(this)">Edit</span><span onclick="this.parentNode.parentNode.remove()">Delete</span>${type==='ai'?'<span onclick="regenerate()">Redo</span>':''}</div>`;
  document.getElementById('messages').appendChild(div);document.getElementById('messages').scrollTop=10000;return div
}
window.editMsg=(el)=>{const newText=prompt('Edit message:',el.parentNode.parentNode.firstChild.innerText);if(newText)el.parentNode.parentNode.firstChild.innerText=newText}
window.regenerate=()=>alert('Regenerating...')

async function sendMsg(){
  const input=document.getElementById('userInput');const text=input.value;if(!text)return;
  addMsg(text,'user');input.value='';
  saveChat(text);
  const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:text})});
  const data=await res.json();
  const aiDiv=addMsg('','ai');
  // parse code blocks
  const parts=data.reply.split(/```/);
  parts.forEach((part,idx)=>{
    if(idx%2===0) aiDiv.firstChild.innerText+=part;
    else {const [lang,...code]=part.split('\n');aiDiv.appendChild(createCodeBlock(code.join('\n'),lang))}
  })
}

function saveChat(msg){
  chats.unshift({id:Date.now(),title:msg.slice(0,30),messages:[msg]});
  localStorage.setItem('chats',JSON.stringify(chats.slice(0,20)));
  renderHistory();
}
function renderHistory(){
  document.getElementById('chatHistory').innerHTML=chats.map(c=>`<div onclick="loadChat(${c.id})" class="p-2 hover:bg-[#222] rounded cursor-pointer">${c.title}</div>`).join('')
}
window.loadChat=(id)=>{const c=chats.find(x=>x.id===id);document.getElementById('messages').innerHTML='';c.messages.forEach(m=>addMsg(m,'user'))}
async function loadChats(){renderHistory()}

// PARTICLES
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');canvas.width=innerWidth;canvas.height=innerHeight;
let particles=Array(50).fill().map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2,dx:(Math.random()-0.5),dy:(Math.random()-0.5)}));
function animate(){ctx.clearRect(0,0,innerWidth,innerHeight);ctx.fillStyle='#CCFF00';particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>innerWidth)p.dx*=-1;if(p.y<0||p.y>innerHeight)p.dy*=-1});requestAnimationFrame(animate)}animate();
</script>
</body>
  </html>
