<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WySub</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            padding: 1em;
            text-align: center;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2em;
        }

        .upload-button {
            background-color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 2em;
            padding: 1em;
            width: 4em;
        }

        #filename {
            margin-top: 1em;
        }

        #process-button {
            background-color: #0f0;
            border: none;
            border-radius: 0.5em;
            cursor: pointer;
            font-size: 1em;
            padding: 0.5em 1em;
            margin-top: 1em;
        }

        #loading-spinner {
            border: 8px solid rgba(0, 0, 0, 0.1);
            border-top: 8px solid #fff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        #cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background-color: #333;
            border: 1px solid #444;
            border-radius: 0.5em;
            margin: 1em;
            padding: 1em;
            width: 45%;
        }

        .card span {
            font-size: 1.5em;
        }

        footer {
            background-color: #333;
            padding: 1em;
            text-align: center;
        }

        #watch-here-button {
            background-color: #0f0;
            border: none;
            border-radius: 0.5em;
            cursor: pointer;
            font-size: 1em;
            padding: 0.5em 1em;
        }
    </style>
</head>
<body>
    <header>
        <h1>WySub</h1>
    </header>
    <main>
        <label for="file" class="upload-button">
            <span>📹</span>
        </label>
        <input type="file" id="file" accept="video/*">
        <p id="filename"></p>
        <button id="process-button" disabled>PROCESS VIDEO</button>
        <div id="loading-spinner" style="display: none;"></div>
        <div id="cards-container" style="display: none;"></div>
        <p id="free-requests-left"></p>
    </main>
    <footer>
        <button id="watch-here-button">WATCH HERE</button>
    </footer>
    <script>
        let fileInput = document.getElementById('file');
        let filenameElement = document.getElementById('filename');
        let processButton = document.getElementById('process-button');
        let loadingSpinner = document.getElementById('loading-spinner');
        let cardsContainer = document.getElementById('cards-container');
        let freeRequestsLeftElement = document.getElementById('free-requests-left');
        let watchHereButton = document.getElementById('watch-here-button');

        let freeRequestsLeft = localStorage.getItem('freeRequestsLeft');
        if (freeRequestsLeft === null) {
            freeRequestsLeft = 3;
        } else {
            freeRequestsLeft = parseInt(freeRequestsLeft);
        }

        freeRequestsLeftElement.textContent = `Free requests left: ${freeRequestsLeft}`;

        fileInput.addEventListener('change', (e) => {
            let file = fileInput.files[0];
            filenameElement.textContent = `📹 ${file.name}`;
            processButton.disabled = false;
        });

        processButton.addEventListener('click', (e) => {
            if (freeRequestsLeft > 0) {
                freeRequestsLeft--;
                localStorage.setItem('freeRequestsLeft', freeRequestsLeft.toString());
                freeRequestsLeftElement.textContent = `Free requests left: ${freeRequestsLeft}`;
                processButton.disabled = true;
                loadingSpinner.style.display = 'block';

                const videoFile = fileInput.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    const videoData = e.target.result;
                    const formData = new FormData();
                    formData.append('file', videoFile);

                    fetch('https://api.wysub.com/api/subtitle', {
                        method: 'POST',
                        body: formData,
                    })
                        .then((response) => response.json())
                        .then((data) => {
                            loadingSpinner.style.display = 'none';
                            cardsContainer.style.display = 'block';
                            cardsContainer.innerHTML = '';
                            data.files.forEach((file) => {
                                let card = document.createElement('div');
                                card.classList.add('card');
                                card.innerHTML = `
                                    <span>${file.flag}</span>
                                    <span>${file.name}</span>
                                    <button class="download-button">Download</button>
                                `;
                                cardsContainer.appendChild(card);
                                let downloadButton = card.querySelector('.download-button');
                                downloadButton.addEventListener('click', (e) => {
                                    window.open('https://potterynaggingformerly.com/zc8d0546ft?key=082d573b4743dc2b0111e797b8b2e4c0', '_blank');
                                    let blob = new Blob([file.srt], { type: 'text/plain' });
                                    let url = URL.createObjectURL(blob);
                                    let a = document.createElement('a');
                                    a.href = url;
                                    a.download = `${file.lang}.srt`;
                                    a.click();
                                });
                            });
                        })
                        .catch((error) => {
                            console.error(error);
                        });
                };
                reader.readAsBinaryString(videoFile);
            } else {
                alert('You have reached the daily limit of free requests.');
            }
        });

        watchHereButton.addEventListener('click', (e) => {
            alert('Coming Soon');
        });

        // Pull to refresh
        document.addEventListener('DOMContentLoaded', function () {
            let refreshing = false;
            window.addEventListener('scroll', function () {
                if (window.scrollY === 0 && !refreshing) {
                    refreshing = true;
                    window.location.reload();
                }
            });
        });
    </script>
</body>
</html>
